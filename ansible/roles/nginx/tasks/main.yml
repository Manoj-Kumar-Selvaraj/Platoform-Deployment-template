---
# Nginx role — install and configure reverse proxy
- name: Install Nginx
  package:
    name: nginx
    state: present

- name: Start and enable Nginx
  systemd:
    name: nginx
    state: started
    enabled: true

- name: Deploy application vhost
  template:
    src: app.conf.j2
    dest: "/etc/nginx/conf.d/{{ app_name }}.conf"
    mode: "0644"
  notify: Reload Nginx

- name: Remove default nginx config
  file:
    path: /etc/nginx/conf.d/default.conf
    state: absent
  notify: Reload Nginx
