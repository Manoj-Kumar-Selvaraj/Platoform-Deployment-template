---
# Deploy application to AWS EC2 instances via SSM
- name: Deploy Application to AWS EC2
  hosts: app_servers
  become: true
  vars:
    image_name: "{{ ecr_registry }}/{{ app_name }}"
    image_tag: "latest"
    container_port: "{{ app_port }}"

  roles:
    - common
    - docker
    - app_deploy
