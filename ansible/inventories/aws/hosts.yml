---
# AWS Inventory — SSM-based connection
# Hosts managed via SSM, not SSH
all:
  children:
    app_servers:
      hosts:
        # Add EC2 instance IDs here
        # i-0123456789abcdef0:
      vars:
        ansible_connection: aws_ssm
        ansible_aws_ssm_region: us-east-1
        ansible_aws_ssm_bucket_name: ""
