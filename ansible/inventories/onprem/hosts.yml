---
# On-Premises Inventory — SSH-based connection
all:
  children:
    app_servers:
      hosts:
        # Add on-prem server hostnames/IPs here
        # server1.example.com:
        #   ansible_host: 192.168.1.10
      vars:
        ansible_connection: ssh
        ansible_user: deploy
        ansible_ssh_private_key_file: ~/.ssh/onprem_deploy_key
