name: Validate Ansible

on:
  push:
    paths:
      - 'ansible/**'
  pull_request:
    paths:
      - 'ansible/**'

jobs:
  validate:
    name: Ansible Lint & Syntax Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ansible

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible & Lint
        run: |
          pip install ansible ansible-lint

      - name: Ansible Lint
        run: ansible-lint playbooks/ roles/
        continue-on-error: true

      - name: Syntax Check — deploy-ec2
        run: ansible-playbook playbooks/deploy-ec2.yml --syntax-check

      - name: Syntax Check — deploy-onprem
        run: ansible-playbook playbooks/deploy-onprem.yml --syntax-check

      - name: Syntax Check — bootstrap-runner
        run: ansible-playbook playbooks/bootstrap-runner.yml --syntax-check
