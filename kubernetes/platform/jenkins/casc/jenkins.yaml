# Jenkins Configuration as Code (JCasC) — Reference File
# NOTE: In the automated Terraform flow, JCasC is inlined in kubernetes.tf
#       via yamlencode in the Jenkins Helm release set blocks.
#       This file documents the intended JCasC structure.
#       ${...} variables are resolved by Jenkins from env vars or K8s secrets.
jenkins:
  systemMessage: "Platform MVP Jenkins — Managed by JCasC. Do not configure manually."
  numExecutors: 0
  mode: EXCLUSIVE

  url: "https://jenkins.manoj-tech-solutions.site"

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_USER:-admin}"
          password: "${JENKINS_ADMIN_PASSWORD}"

  authorizationStrategy:
    loggedInUsersCanDoAnything:
      allowAnonymousRead: false

  clouds:
    - kubernetes:
        name: "kubernetes"
        serverUrl: ""
        jenkinsTunnel: "jenkins-agent:50000"
        jenkinsUrl: "http://jenkins:8080"
        namespace: "jenkins"
        podLabels:
          - key: "jenkins/agent"
            value: "true"
        templates:
          - name: "default-agent"
            label: "kubernetes"
            nodeUsageMode: NORMAL
            containers:
              - name: "jnlp"
                image: "jenkins/inbound-agent:latest-jdk17"
                workingDir: "/home/jenkins/agent"
                resourceRequestCpu: "250m"
                resourceRequestMemory: "256Mi"
                resourceLimitCpu: "500m"
                resourceLimitMemory: "512Mi"
            nodeSelector: "role=platform-exec"
            yamlMergeStrategy: "override"
            yaml: |
              spec:
                tolerations: []

          - name: "docker-agent"
            label: "docker"
            nodeUsageMode: EXCLUSIVE
            containers:
              - name: "jnlp"
                image: "jenkins/inbound-agent:latest-jdk17"
                workingDir: "/home/jenkins/agent"
                resourceRequestCpu: "250m"
                resourceRequestMemory: "256Mi"
              - name: "docker"
                image: "docker:dind"
                privileged: true
                workingDir: "/home/jenkins/agent"
                resourceRequestCpu: "500m"
                resourceRequestMemory: "512Mi"
                resourceLimitCpu: "1"
                resourceLimitMemory: "1Gi"
                envVars:
                  - envVar:
                      key: "DOCKER_TLS_CERTDIR"
                      value: ""
            nodeSelector: "role=platform-exec"
            volumes:
              - emptyDirVolume:
                  mountPath: "/var/lib/docker"
                  memory: false

  globalNodeProperties:
    - envVars:
        env:
          - key: "AWS_REGION"
            value: "us-east-1"
          - key: "ECR_REGISTRY"
            value: "" # Set by Terraform — your ECR registry URL (e.g., 123456789012.dkr.ecr.us-east-1.amazonaws.com)
          - key: "SONAR_URL"
            value: "https://sonar.manoj-tech-solutions.site"

unclassified:
  sonarGlobalConfiguration:
    buildWrapperEnabled: true
    installations:
      - name: "SonarQube"
        serverUrl: "https://sonar.manoj-tech-solutions.site"
        credentialsId: "sonarqube-token"
        triggers:
          skipScmCause: false
          skipUpstreamCause: false

  globalLibraries:
    libraries:
      - name: "platform-shared-lib"
        defaultVersion: "main"
        implicit: true
        retriever:
          modernSCM:
            scm:
              git:
                remote: "" # Set to your shared library Git repo URL
                credentialsId: "github-credentials"

credentials:
  system:
    domainCredentials:
      - credentials:
          - string:
              scope: GLOBAL
              id: "sonarqube-token"
              secret: "${SONARQUBE_TOKEN}"
              description: "SonarQube authentication token"
          - usernamePassword:
              scope: GLOBAL
              id: "github-credentials"
              username: "" # Set to your GitHub username
              password: "" # Set to your GitHub PAT
              description: "GitHub credentials"
